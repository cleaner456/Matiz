name: Roxy Stream Pipeline Test

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:  # Manual trigger button GitHub pe

jobs:
  test:
    name: Run InnerTube Tests
    runs-on: ubuntu-latest

    steps:
      # Step 1: Code checkout
      - name: Checkout repo
        uses: actions/checkout@v4

      # Step 2: JDK 17 setup (NewPipe needs 17+)
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      # Step 3: Setup Gradle
      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: '8.5'

      # Step 4: Build check
      - name: Build project
        run: gradle compileKotlin --no-daemon
        continue-on-error: false

      # Step 5: Run tests
      - name: Run Roxy Stream Tests
        run: gradle test --no-daemon --info
        timeout-minutes: 5

      # Step 7: Test results upload (pass ya fail dono cases mein)
      - name: Upload test results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: test-results
          path: build/reports/tests/test/
